<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Code Editor</title>
    <link rel="stylesheet" href="file:///android_asset/monaco/vs/editor/editor.main.css"/>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1e1e1e;
        }
        #editor-container {
            width: 100%;
            height: 100%;
        }
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1e1e1e;
            color: #cccccc;
            font-family: monospace;
            font-size: 16px;
            z-index: 100;
        }
        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #0078d4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 12px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        Loading Editor...
    </div>
    <div id="editor-container"></div>

    <script>
        window.MonacoEnvironment = {
            getWorkerUrl: function(moduleId, label) {
                return 'data:text/javascript;charset=utf-8,' + encodeURIComponent(
                    'self.MonacoEnvironment={baseUrl:"file:///android_asset/monaco/"};' +
                    'importScripts("file:///android_asset/monaco/vs/base/worker/workerMain.js");'
                );
            }
        };
        var require = { paths: { 'vs': 'file:///android_asset/monaco/vs' } };
    </script>
    <script src="file:///android_asset/monaco/vs/loader.min.js"></script>
    <script>
        var editor;
        var currentTabId = '';
        var isChanging = false;
        var changeTimeout = null;

        require(['vs/editor/editor.main'], function() {
            document.getElementById('loading').style.display = 'none';

            editor = monaco.editor.create(document.getElementById('editor-container'), {
                value: '// Welcome to VSCode Android\n// Open a folder from the Explorer to start coding\n',
                language: 'javascript',
                theme: 'vs-dark',
                fontSize: 14,
                fontFamily: "'JetBrains Mono', 'Fira Code', 'Courier New', monospace",
                lineNumbers: 'on',
                minimap: { enabled: true },
                wordWrap: 'on',
                scrollBeyondLastLine: false,
                automaticLayout: true,
                tabSize: 4,
                insertSpaces: true,
                detectIndentation: true,
                formatOnType: false,
                formatOnPaste: false,
                renderWhitespace: 'selection',
                cursorBlinking: 'blink',
                cursorStyle: 'line',
                smoothScrolling: true,
                mouseWheelZoom: true,
                contextmenu: true,
                quickSuggestions: {
                    other: true,
                    comments: false,
                    strings: false
                },
                parameterHints: { enabled: true },
                suggestOnTriggerCharacters: true,
                acceptSuggestionOnEnter: 'on',
                snippetSuggestions: 'top',
                folding: true,
                foldingStrategy: 'auto',
                showFoldingControls: 'always',
                bracketPairColorization: { enabled: true },
                guides: {
                    bracketPairs: true,
                    indentation: true
                },
                renderLineHighlight: 'all',
                scrollbar: {
                    verticalScrollbarSize: 10,
                    horizontalScrollbarSize: 10
                },
                padding: { top: 8 }
            });

            // Auto-save on change with debounce
            editor.onDidChangeModelContent(function(e) {
                if (isChanging || !currentTabId) return;
                if (changeTimeout) clearTimeout(changeTimeout);
                changeTimeout = setTimeout(function() {
                    try {
                        AndroidBridge.onContentChange(currentTabId, editor.getValue());
                    } catch(err) {}
                }, 500);
            });

            // Ctrl+S / Cmd+S to save
            editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.KeyS, function() {
                try {
                    AndroidBridge.onSave(currentTabId, editor.getValue());
                } catch(err) {}
            });

            // Handle resize
            window.addEventListener('resize', function() {
                editor.layout();
            });

            // Notify Android that editor is ready
            try { AndroidBridge.log('Monaco Editor initialized'); } catch(e) {}
        });

        // Called from Android to set editor content
        function setEditorContent(content, language, tabId) {
            if (!editor) return;
            isChanging = true;
            currentTabId = tabId;

            var model = editor.getModel();
            if (model) {
                monaco.editor.setModelLanguage(model, language || 'plaintext');
                model.setValue(content || '');
            }

            editor.setPosition({ lineNumber: 1, column: 1 });
            editor.revealPosition({ lineNumber: 1, column: 1 });

            setTimeout(function() { isChanging = false; }, 100);
        }

        // Called from Android to get content
        function getEditorContent() {
            if (!editor) return '';
            return editor.getValue();
        }

        // Called from Android to apply settings
        function applySettings(settings) {
            if (!editor) return;

            var options = {};
            if (settings.theme) monaco.editor.setTheme(settings.theme);
            if (settings.fontSize) options.fontSize = settings.fontSize;
            if (settings.tabSize) options.tabSize = settings.tabSize;
            if (typeof settings.wordWrap !== 'undefined') options.wordWrap = settings.wordWrap ? 'on' : 'off';
            if (typeof settings.minimap !== 'undefined') options.minimap = { enabled: settings.minimap };
            if (typeof settings.lineNumbers !== 'undefined') options.lineNumbers = settings.lineNumbers ? 'on' : 'off';

            editor.updateOptions(options);
        }

        // Toggle find/replace widget
        function toggleSearch() {
            if (!editor) return;
            editor.trigger('', 'actions.find', null);
        }

        // Format document
        function formatDocument() {
            if (!editor) return;
            editor.trigger('', 'editor.action.formatDocument', null);
        }

        // Go to line
        function goToLine(line) {
            if (!editor) return;
            editor.revealLineInCenter(line);
            editor.setPosition({ lineNumber: line, column: 1 });
        }

        // Get cursor position
        function getCursorPosition() {
            if (!editor) return JSON.stringify({line: 0, col: 0});
            var pos = editor.getPosition();
            return JSON.stringify({ line: pos.lineNumber, col: pos.column });
        }

        // Insert text at cursor
        function insertText(text) {
            if (!editor) return;
            var selection = editor.getSelection();
            editor.executeEdits('insert', [{
                range: selection,
                text: text,
                forceMoveMarkers: true
            }]);
        }
    </script>
</body>
</html>
